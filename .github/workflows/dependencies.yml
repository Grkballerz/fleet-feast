name: Dependency Updates

on:
  schedule:
    # Run weekly on Mondays at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for outdated dependencies
        id: outdated
        run: |
          npm outdated --json > outdated.json || true
          if [ -s outdated.json ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: Create update branch
        if: steps.outdated.outputs.has_updates == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH_NAME="deps/automated-update-$(date +'%Y%m%d')"
          git checkout -b "$BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Update patch and minor versions
        if: steps.outdated.outputs.has_updates == 'true'
        run: |
          npm update --save

      - name: Install dependencies
        if: steps.outdated.outputs.has_updates == 'true'
        run: npm install

      - name: Run tests
        if: steps.outdated.outputs.has_updates == 'true'
        run: |
          npx prisma generate
          npm test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: test-secret

      - name: Commit changes
        if: steps.outdated.outputs.has_updates == 'true'
        run: |
          git add package.json package-lock.json
          git commit -m "chore(deps): automated dependency updates

          - Updated patch and minor versions
          - All tests passing

          Generated by automated workflow" || echo "No changes to commit"

      - name: Push changes
        if: steps.outdated.outputs.has_updates == 'true'
        run: |
          git push origin "$BRANCH_NAME"

      - name: Create Pull Request
        if: steps.outdated.outputs.has_updates == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔄 Automated Dependency Updates',
              head: process.env.BRANCH_NAME,
              base: 'main',
              body: `## Automated Dependency Updates

            This PR updates patch and minor dependency versions.

            ### Changes
            - ✅ All tests passing
            - ✅ No breaking changes expected (patch/minor only)

            ### Action Required
            - Review the changes
            - Check for any deprecation warnings
            - Verify preview deployment works correctly
            - Merge when ready

            ---
            *Generated by automated dependency update workflow*`
            });

            console.log(\`Pull Request created: #\${pr.number}\`);

  check-security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run security audit
        run: |
          npm audit --audit-level=high --production
